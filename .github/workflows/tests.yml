name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y libpam0g-dev libcurl4-openssl-dev libglib2.0-dev gcc g++ cmake libgtest-dev
          cd /usr/src/gtest && sudo cmake . && sudo cmake --build . && sudo mv lib/libg* /usr/local/lib/

      - name: Install Python dependencies
        run: pip install flask flask-redis fakeredis PyYAML PyJWT

      - name: Run Python tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:./pivportal/lib"
          python -m unittest discover -s pivportal/test/

      - name: Build and test PAM module
        run: |
          cd pam_pivportal
          make clean && make
          make clean && make test

